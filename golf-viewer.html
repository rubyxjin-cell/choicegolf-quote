<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초이스골프 — 골프투어 견적서</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fff;--off:#F8F7F5;--line:#E8E6E1;--line2:#D4D1CA;--ink:#111110;--ink2:#4A4A46;--ink3:#8A8A84;--accent:#1C3D2E;--gold:#A07840;--gold-lt:#C9A268;--red:#8B2E2E}
html{scroll-behavior:smooth}
body{background:#DDDBD5;font-family:'Noto Sans KR',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;color:var(--ink);padding-bottom:80px}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s ease}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold-lt);letter-spacing:1px;margin-bottom:16px}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);animation:dot 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}

/* ERROR */
.error-screen{display:none;position:fixed;inset:0;background:var(--off);flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:998}
.error-screen.show{display:flex}
.error-icon{font-size:48px}
.error-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--ink)}
.error-desc{font-size:13px;color:var(--ink3)}

/* LAYOUT */
.wrap{background:var(--white);max-width:500px;margin:0 auto;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,0.10)}

@media(min-width:768px){
  body{padding:40px 24px 0;padding-bottom:0!important}
  .wrap{max-width:1100px;border-radius:20px;overflow:hidden;min-height:auto;box-shadow:0 20px 80px rgba(0,0,0,0.14)}
  .site-header{padding:22px 52px!important}
  .hero{padding:64px 52px 60px!important;display:grid!important;grid-template-columns:1fr 340px!important;gap:48px;align-items:start}
  .hero-right{display:flex!important}
  section,.contact-sec{padding:56px 52px!important}
  .media-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:20px!important}
  .share-bar{position:static!important;justify-content:flex-end!important;padding:16px 52px!important;border-top:1px solid var(--line)!important}
  .share-btn{flex:0 0 auto!important;padding:12px 28px!important}
  .site-footer{padding:36px 52px!important;display:flex!important;align-items:center!important;justify-content:space-between!important;text-align:left!important}
  .footer-right{text-align:right}
}

/* HEADER */
.site-header{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,0.94);backdrop-filter:blur(14px);z-index:100}
.logo-box{width:40px;height:40px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold-lt);flex-shrink:0;overflow:hidden}
.logo-box img{width:100%;height:100%;object-fit:cover}

/* SECTION */
section,.contact-sec{padding:44px 20px;border-bottom:1px solid var(--line)}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.sec-n{font-family:'Cormorant Garamond',serif;font-size:11px;color:#888;letter-spacing:1px}
.sec-t{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink)}
.sec-l{flex:1;height:1px;background:var(--line)}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--off);border-radius:20px;font-size:12px;color:var(--ink2);border:1px solid var(--line)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13px;padding:10px 22px;border-radius:24px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHARE BAR */
.share-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:12px 20px 24px;display:flex;gap:10px;z-index:200}
.share-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:500;border:none;cursor:pointer;flex:1;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s,transform .1s}
.share-btn:active{opacity:.8;transform:scale(.98)}
.btn-kakao{background:#FEE500;color:#3A1D1D}
.btn-link{background:var(--accent);color:white}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Choice Golf</div>
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- ERROR -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">😔</div>
  <div class="error-title">견적서를 찾을 수 없어요</div>
  <div class="error-desc">링크가 만료되었거나 잘못된 주소입니다</div>
</div>

<!-- CONTENT (JS가 채워줌) -->
<div class="wrap" id="mainWrap" style="display:none"></div>

<div class="toast" id="toast">링크가 복사되었습니다 ✓</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

/* ── URL에서 id 추출 ── */
const params = new URLSearchParams(window.location.search);
const quoteId = params.get('id');

if (!quoteId) {
  showError();
} else {
  fetchQuote(quoteId);
}

async function fetchQuote(id) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}&select=data`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const rows = await res.json();
    if (!rows || rows.length === 0) { showError(); return; }
    let d = rows[0].data;
    if (typeof d === "string") { try { d = JSON.parse(d); } catch(e) { showError(); return; } }
    document.title = `${d.companyName} — ${d.destination} 골프투어`;
    renderPage(d);
  } catch(e) {
    showError();
  }
}

function showError() {
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('errorScreen').classList.add('show');
}

function renderPage(d) {
  const wrap = document.getElementById('mainWrap');

  // ── 인원 표기 (텍스트 or 숫자 둘 다 처리)
  const paxText = d.pax || '';
  const paxNum = parseInt(paxText) || 0;

  // ── 요금 표기
  const pp = d.pricePerPerson || 0;
  const perPersonStr = pp ? '₩' + pp.toLocaleString() : '—';
  const perPersonMan = pp ? Math.round(pp / 10000) + '만원' : '—';

  // ── 별점
  const starsStr = '★'.repeat(parseInt(d.hotelStars) || 5);

  // ── chip style
  const chipS = 'display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:#F8F7F5;border-radius:20px;font-size:12px;color:#111;border:1px solid #E8E6E1;margin:3px 0';

  // ── 포함/불포함
  const incHTML = (d.includes || []).map(t =>
    `<li style="font-size:12px;color:#111;display:flex;gap:7px;align-items:flex-start;margin-bottom:7px"><span style="font-size:10px;margin-top:1px;flex-shrink:0;font-weight:700;color:#1C3D2E">✓</span>${t}</li>`).join('');
  const excHTML = (d.excludes || []).map(t =>
    `<li style="font-size:12px;color:#111;display:flex;gap:7px;align-items:flex-start;margin-bottom:7px"><span style="font-size:10px;margin-top:1px;flex-shrink:0;font-weight:700;color:#8B2E2E">✕</span>${t}</li>`).join('');

  // ── 호텔 편의시설
  const hotelFacHTML = (d.hotelFacilities || []).map(f =>
    `<span style="font-size:11px;padding:4px 10px;background:#F8F7F5;border:1px solid #E8E6E1;border-radius:20px;color:#111">${f}</span>`).join('');

  // ── 일정표 (새 형식: 시간/교통/내용 + 식사 + 호텔)
  const dayLabels = ['1일차','2일차','3일차','4일차','5일차','6일차','7일차','8일차','9일차','10일차'];

  // ── 통합 일정표 (전체를 하나의 테이블로)
  const dayRowsAll = (d.days || []).map((day, i) => {
    const isLast = i === d.days.length - 1;
    const dayLabel = dayLabels[i] || (i+1)+'일차';
    const headerBg = isLast ? '#5A4030' : '#2A4A5E';
    const sepStyle = !isLast ? 'border-bottom:3px solid #2A4A5E' : '';

    // 일정 행들
    const itemRows = (day.items || []).map((it, ri) => {
      const bg = ri % 2 === 0 ? '#fff' : '#F9F9F8';
      const borderLeft = it.color ? `border-left:3px solid ${it.color}` : '';
      const itemBg = it.color ? `background:${it.color}18` : `background:${bg}`;
      const textWeight = it.color ? 'font-weight:700' : 'font-weight:400';
      const textColor = it.color ? `color:${it.color}` : 'color:#111';
      return `<tr style="${itemBg};${borderLeft};border-bottom:1px solid #EFEFED">
        <td style="padding:8px 10px;font-size:12px;color:#8A6020;font-weight:700;white-space:nowrap;vertical-align:top;width:46px;border-right:1px solid #E8E6E0">${it.time||''}</td>
        <td style="padding:8px 7px;font-size:11px;color:#333;white-space:nowrap;vertical-align:top;width:54px;border-right:1px solid #E8E6E0">${it.transport||''}</td>
        <td style="padding:8px 10px;font-size:13px;${textColor};${textWeight};line-height:1.5;word-break:keep-all">${it.text||''}</td>
      </tr>`;
    }).join('');

    // 식사 한 줄 표기
    const mealTexts = [];
    if (day.meals) {
      if (day.meals.bf) mealTexts.push(`🍳 조식: ${day.meals.bf}`);
      if (day.meals.lunch) mealTexts.push(`🍜 중식: ${day.meals.lunch}`);
      if (day.meals.dinner) mealTexts.push(`🍽 석식: ${day.meals.dinner}`);
    }
    const mealRow = mealTexts.length ? `<tr style="background:#FFF9E0;border-bottom:1px solid #F0E098">
      <td colspan="3" style="padding:6px 10px;font-size:11px;font-weight:700;color:#6B4C00;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${mealTexts.join('&nbsp;&nbsp;')}</td>
    </tr>` : '';

    // 숙박 한 줄 표기
    const hotelRow = day.hotelStay ? `<tr style="background:#EAF2FF;${sepStyle}">
      <td colspan="3" style="padding:6px 10px;font-size:11px;font-weight:700;color:#1A4BAB">🏨 숙박 : ${day.hotelStay}</td>
    </tr>` : `<tr style="height:4px;background:#F0EEE8;${sepStyle}"><td colspan="3"></td></tr>`;

    return `
      <tr style="background:${headerBg}">
        <td colspan="3" style="padding:9px 12px">
          <span style="font-size:13px;font-weight:900;color:white;margin-right:10px">${dayLabel}</span>
          <span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.9)">${day.title||''}</span>
        </td>
      </tr>
      ${itemRows}
      ${mealRow}
      ${hotelRow}`;
  }).join('');

  const daysHTML = `<div style="border:1px solid #C8C5BE;border-radius:12px;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">${dayRowsAll}</table>
  </div>`;

  // ── 요금 (새 형식: 성인 1인 + 선택 추가)
  const extraPrices = [];
  if (d.priceNoFlight != null) extraPrices.push({label:'항공권 미포함 1인', amount: d.priceNoFlight});
  if (d.priceChild != null) extraPrices.push({label:'아동 1인', amount: d.priceChild});
  if (d.priceInfant != null) extraPrices.push({label:'유아 1인', amount: d.priceInfant});

  const extraPriceHTML = extraPrices.map((ep, i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #E8E6E1;background:${i%2===0?'white':'#FAFAF8'}">
      <div style="font-size:13px;color:#111">${ep.label}</div>
      <div style="font-size:15px;font-weight:600;color:#111;font-variant-numeric:tabular-nums">₩${Number(ep.amount).toLocaleString()}</div>
    </div>`).join('');

  // ── 안내 메모
  const noteLines = (d.priceNote || '').split('\n').filter(Boolean).map(l => `${l}<br>`).join('');

  // ── 호텔 사진
  const hotelPhotoEl = d.hotelPhotoUrl
    ? `<img src="${d.hotelPhotoUrl}" style="width:100%;height:190px;object-fit:cover">`
    : `<div style="width:100%;height:190px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;background:linear-gradient(135deg,#BFD4C8 0%,#7A9A8A 100%)"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.3))"></div><div style="position:absolute;bottom:12px;left:14px;background:rgba(0,0,0,0.5);color:white;font-size:11px;padding:4px 10px;border-radius:20px">${d.destination||''} · ${d.hotelNights||''}박</div>🏨</div>`;

  // ── 골프장
  const coursesHTML = (d.courses || []).map((c, i) => {
    const bg = i%2===0 ? 'linear-gradient(135deg,#A8C8A8,#4A7860)' : 'linear-gradient(135deg,#90B4A0,#3A6050)';
    const photoEl = c.photoUrl
      ? `<img src="${c.photoUrl}" style="width:100%;height:190px;object-fit:cover">`
      : `<div style="width:100%;height:190px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;background:${bg}"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.3))"></div><div style="position:absolute;bottom:12px;left:14px;background:rgba(0,0,0,0.5);color:white;font-size:11px;padding:4px 10px;border-radius:20px">Day ${c.day||''} · ${c.round||''}라운드</div><span style="position:relative">⛳</span></div>`;
    const featHTML = (Array.isArray(c.features) ? c.features : (c.features||'').split(',').filter(Boolean))
      .map(f => `<span style="font-size:11px;padding:4px 10px;background:#F8F7F5;border:1px solid #E8E6E1;border-radius:20px;color:#111">${f.trim()}</span>`).join('');
    return `
      <div style="border:1px solid #E8E6E1;border-radius:14px;overflow:hidden;background:white;margin-bottom:20px">
        ${photoEl}
        <div style="padding:18px 18px 20px">
          <div style="font-size:11px;color:#A07840;letter-spacing:1px;margin-bottom:6px">${c.rating||''}</div>
          <div style="font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;color:#111;margin-bottom:4px;line-height:1.3">${c.name||''}</div>
          <div style="font-size:12px;color:#444;margin-bottom:12px">${c.nameJp||''}${c.nameJp&&c.holes?' · ':''}${c.holes||''}</div>
          ${c.desc ? `<div style="font-size:13px;color:#111;line-height:1.8;border-top:1px solid #E8E6E1;padding-top:12px;margin-bottom:12px">${c.desc}</div>` : ''}
          <div style="display:flex;flex-wrap:wrap;gap:6px">${featHTML}</div>
        </div>
      </div>`;
  }).join('');

  wrap.innerHTML = `
    <!-- HEADER -->
    <header class="site-header" style="padding:0;flex-direction:column;align-items:stretch;height:auto">
      <div style="padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EDE8">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:36px;height:36px;border-radius:8px;background:#1C3D2E;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#C9A268;flex-shrink:0;letter-spacing:.5px">CG</div>
          <div>
            <div style="font-size:14px;font-weight:700;color:#111;line-height:1.2">${d.companyName||'초이스골프'}</div>
            <div style="font-size:9px;color:#444;letter-spacing:2px;text-transform:uppercase">${d.companyNameEn||'Choice Golf Tour'}</div>
          </div>
        </div>
        <div style="font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;border:1px solid #D4D1CA;padding:4px 10px;border-radius:20px">견적서</div>
      </div>
      <div style="padding:6px 16px 8px;background:#F8F7F4">
        <div style="font-size:10px;color:#6B6B65;line-height:1.8;letter-spacing:0.2px">
          <span style="font-weight:600;color:#333">(주)초이스골프</span>&nbsp;|&nbsp;☎ 1533-3160
          ${d.quoteDate ? `&nbsp;|&nbsp;견적발송일: <strong>${d.quoteDate}</strong>` : ''}
        </div>
        <div style="font-size:10px;color:#6B6B65;letter-spacing:0.2px">
          사업자등록 594-88-03010&nbsp;|&nbsp;관광사업 제2025-000011호&nbsp;|&nbsp;통신판매업 제2025-서울중구-213호
        </div>
      </div>
    </header>

    <!-- HERO -->
    <div class="hero reveal" style="padding:40px 20px 36px;border-bottom:1px solid #E8E6E1;position:relative;overflow:hidden">
      <div style="position:relative;z-index:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="width:24px;height:1px;background:#A07840;display:inline-block"></span>
          <span style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#A07840;font-weight:500">Overseas Golf Tour Proposal</span>
        </div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:clamp(36px,10vw,54px);font-weight:300;font-style:italic;color:#111;line-height:1.05;margin-bottom:6px">${(d.destination||'').split(' ')[0]}<br><strong style="font-weight:600;font-style:normal;display:block;font-size:clamp(28px,7.5vw,42px)">${(d.destination||'').split(' ').slice(1).join(' ')}</strong></div>
        <p style="font-size:13px;color:#444;margin-top:14px;line-height:1.75">세계가 인정한 명코스에서 잊을 수 없는 라운드를 경험하세요.</p>
        <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:20px">
          ${d.period ? `<div style="${chipS}">📅 ${d.period}</div>` : ''}
          ${paxText ? `<div style="${chipS}">👤 ${paxText}</div>` : ''}
          ${d.rounds ? `<div style="${chipS}">⛳ ${d.rounds}라운드</div>` : ''}
          ${d.nights ? `<div style="${chipS}">🌙 ${d.nights}박 ${parseInt(d.nights)+1}일</div>` : ''}
        </div>
        ${d.customerName ? `<div style="margin-top:16px;padding:10px 14px;background:rgba(28,61,46,0.06);border-radius:10px;font-size:13px;color:#2A4A2E;font-weight:500">📋 ${d.customerName} 님 · ${paxText}</div>` : ''}
      </div>
    </div>

    <!-- 01 요금 안내 -->
    <section class="reveal">
      <div class="sec-hd"><span class="sec-n">01</span><span class="sec-t">여행 요금 안내</span><span class="sec-l"></span></div>
      <div style="background:#1C3D2E;border-radius:16px;padding:20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-bottom:6px">패키지 요금</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:#C9A268;line-height:1;letter-spacing:-1px">${perPersonMan}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:4px">1인 기준 · ${d.destination||''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-bottom:4px">성인 1인</div>
          <div style="font-size:18px;font-weight:700;color:white">${perPersonStr}</div>
        </div>
      </div>
      ${extraPriceHTML ? `<div style="border:1px solid #E8E6E1;border-radius:12px;overflow:hidden;margin-bottom:14px">${extraPriceHTML}</div>` : ''}
      ${d.priceNote ? `<div style="padding:12px 14px;background:#FFF9F0;border-left:2.5px solid #C9A268;border-radius:0 8px 8px 0;font-size:12px;color:#444;line-height:1.8">${noteLines}</div>` : ''}
    </section>

    <!-- 02 상세 일정표 -->
    <section class="reveal" style="background:#F8F7F5">
      <div class="sec-hd"><span class="sec-n">02</span><span class="sec-t">상세 일정표</span><span class="sec-l"></span></div>
      <div>${daysHTML}</div>
      ${incHTML || excHTML ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px">
        <div style="border-radius:12px;padding:16px;border:1px solid #C4DFD0;background:#F3FAF6">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;color:#1C3D2E">포함</div>
          <ul style="list-style:none">${incHTML}</ul>
        </div>
        <div style="border-radius:12px;padding:16px;border:1px solid #DFCAC9;background:#FDF4F4">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;color:#8B2E2E">불포함</div>
          <ul style="list-style:none">${excHTML}</ul>
        </div>
      </div>` : ''}
    </section>

    <!-- 03 호텔 -->
    ${d.hotelName ? `
    <section class="reveal">
      <div class="sec-hd"><span class="sec-n">03</span><span class="sec-t">숙박 호텔</span><span class="sec-l"></span></div>
      <div style="border:1px solid #E8E6E1;border-radius:14px;overflow:hidden;background:white">
        ${hotelPhotoEl}
        <div style="padding:18px 18px 20px">
          <div style="font-size:11px;color:#A07840;letter-spacing:1px;margin-bottom:6px">${starsStr}</div>
          <div style="font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;color:#111;margin-bottom:4px;line-height:1.3">${d.hotelName||''}</div>
          <div style="font-size:12px;color:#444;margin-bottom:12px">${d.hotelNameKr||''} · ${d.hotelRoom||''}</div>
          ${d.hotelDesc ? `<div style="font-size:13px;color:#111;line-height:1.8;border-top:1px solid #E8E6E1;padding-top:12px">${d.hotelDesc}</div>` : ''}
          ${hotelFacHTML ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">${hotelFacHTML}</div>` : ''}
        </div>
      </div>
    </section>` : ''}

    <!-- 04 골프장 -->
    ${coursesHTML ? `
    <section class="reveal" style="background:#F8F7F5">
      <div class="sec-hd"><span class="sec-n">04</span><span class="sec-t">라운드 코스</span><span class="sec-l"></span></div>
      <div>${coursesHTML}</div>
    </section>` : ''}

    <!-- 05 문의 -->
    <div class="contact-sec reveal">
      <div class="sec-hd"><span class="sec-n">05</span><span class="sec-t">문의 · 예약</span><span class="sec-l"></span></div>
      <div style="border:1px solid #E8E6E1;border-radius:14px;overflow:hidden">
        <a href="tel:${d.contactPhone||''}" style="display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid #E8E6E1;text-decoration:none;color:inherit">
          <div style="width:36px;height:36px;border-radius:10px;background:#E8F2EC;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">📞</div>
          <div><div style="font-size:11px;color:#444;margin-bottom:2px">전화 문의</div><div style="font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;color:#111">${d.contactPhone||''}</div></div>
          <div style="margin-left:auto;color:#444;font-size:18px">›</div>
        </a>
        <div style="display:flex;align-items:center;gap:14px;padding:15px 18px">
          <div style="width:36px;height:36px;border-radius:10px;background:#FEE500;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">💬</div>
          <div><div style="font-size:11px;color:#444;margin-bottom:2px">카카오톡 채널</div><div style="font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;color:#111">${d.contactKakao||''}</div></div>
          <div style="margin-left:auto;color:#444;font-size:18px">›</div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer" style="padding:32px 20px 80px;text-align:center;background:#F8F7F5;border-top:1px solid #E8E6E1">
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#111;letter-spacing:.5px;margin-bottom:4px">${d.companyName||'초이스골프'}</div>
      <div style="font-size:11px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">${d.companyNameEn||'Choice Golf Tour'}</div>
      <div style="font-size:11px;color:#444;line-height:2">광고 없는 맞춤 견적 페이지 · 본 페이지는 ${d.companyName||'초이스골프'} 전용입니다</div>
    </footer>

    <!-- SHARE BAR -->
    <div class="share-bar">
      <button class="share-btn btn-kakao" onclick="shareKakao()">💬 카카오톡 공유</button>
      <button class="share-btn btn-link" onclick="copyLink()">🔗 링크 복사</button>
    </div>
  `;

  wrap.style.display = 'block';
  document.getElementById('loadingScreen').classList.add('hide');

  setTimeout(() => {
    const io = new IntersectionObserver(e => e.forEach(x => {
      if (x.isIntersecting) { x.target.classList.add('visible'); io.unobserve(x.target); }
    }), { threshold: .06 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }, 100);
}

function copyLink() {
  const url = window.location.href;
  if (navigator.clipboard) { navigator.clipboard.writeText(url).then(showToast); }
  else {
    const t = document.createElement('textarea');
    t.value = url; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t); showToast();
  }
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}
function shareKakao() {
  if (navigator.share) {
    const title = document.title;
    navigator.share({ title, text: '골프투어 견적서를 확인하세요!', url: window.location.href });
  } else { copyLink(); }
}
</script>
</body>
</html>
