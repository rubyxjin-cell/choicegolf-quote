<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초이스골프 — 골프투어 견적서</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fff;--off:#F8F7F5;--line:#E8E6E1;--line2:#D4D1CA;--ink:#111110;--ink2:#4A4A46;--ink3:#8A8A84;--accent:#2C2C2C;--navy:#2A4A5E;--green:#4A7A5A;--gold:#A07840;--gold-lt:#C9A268;--red:#8B2E2E;--red2:#C0392B}
html{scroll-behavior:smooth}
body{background:#DDDBD5;font-family:'Noto Sans KR',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;color:var(--ink);padding-bottom:80px}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s ease}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold-lt);letter-spacing:1px;margin-bottom:16px}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);animation:dot 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}

/* ERROR */
.error-screen{display:none;position:fixed;inset:0;background:var(--off);flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:998}
.error-screen.show{display:flex}
.error-icon{font-size:48px}
.error-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--ink)}
.error-desc{font-size:13px;color:var(--ink3)}

/* LAYOUT */
.wrap{background:var(--white);max-width:500px;margin:0 auto;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,0.10)}

@media(min-width:768px){
  body{padding:40px 24px 0;padding-bottom:0!important}
  .wrap{max-width:540px;border-radius:20px;overflow:hidden;min-height:auto;box-shadow:0 20px 80px rgba(0,0,0,0.14)}
  section,.contact-sec{padding:48px 40px!important}
  .share-bar{position:static!important;padding:16px 40px 24px!important;border-top:1px solid var(--line)!important}
  .share-btn{flex:0 0 auto!important;padding:12px 28px!important}
}

/* HEADER */
.site-header{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,0.94);backdrop-filter:blur(14px);z-index:100}
.logo-box{width:40px;height:40px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold-lt);flex-shrink:0;overflow:hidden}
.logo-box img{width:100%;height:100%;object-fit:cover}

/* SECTION */
section,.contact-sec{padding:44px 20px;border-bottom:1px solid var(--line)}
.sec-title{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#8A8A84;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:#E8E6E1}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--off);border-radius:20px;font-size:12px;color:var(--ink2);border:1px solid var(--line)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13px;padding:10px 22px;border-radius:24px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHARE BAR */
.share-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:12px 20px 24px;display:flex;gap:10px;z-index:200}
.share-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:500;border:none;cursor:pointer;flex:1;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s,transform .1s}
.share-btn:active{opacity:.8;transform:scale(.98)}
.btn-kakao{background:#FEE500;color:#3A1D1D}
.btn-link{background:var(--accent);color:white}


</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Choice Golf</div>
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- ERROR -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">😔</div>
  <div class="error-title">견적서를 찾을 수 없어요</div>
  <div class="error-desc">링크가 만료되었거나 잘못된 주소입니다</div>
</div>

<!-- CONTENT (JS가 채워줌) -->
<div class="wrap" id="mainWrap" style="display:none"></div>

<div class="toast" id="toast">링크가 복사되었습니다 ✓</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

/* ── URL에서 id 추출 ── */
const params = new URLSearchParams(window.location.search);
const quoteId = params.get('id');

if (!quoteId) {
  showError();
} else {
  fetchQuote(quoteId);
}

async function fetchQuote(id) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}&select=data`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const rows = await res.json();
    if (!rows || rows.length === 0) { showError(); return; }
    let d = rows[0].data;
    if (typeof d === "string") { try { d = JSON.parse(d); } catch(e) { showError(); return; } }
    document.title = `${d.companyName} — ${d.destination} 골프투어`;
    renderPage(d);
  } catch(e) {
    showError();
  }
}

function showError() {
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('errorScreen').classList.add('show');
}

function renderPage(d) {
  const wrap = document.getElementById('mainWrap');

  // ── 인원 표기
  const paxText = d.pax || '';

  // ── 요금 표기
  const pp = d.pricePerPerson || 0;
  const perPerson = pp ? pp.toLocaleString() : '—';

  // ── 별점
  const starsStr = d.hotelStars ? '★'.repeat(parseInt(d.hotelStars)) : '';

  // ── 날짜 계산용
  const dayLabels = ['1일차','2일차','3일차','4일차','5일차','6일차','7일차','8일차','9일차','10일차'];

  // ── 일정표 HTML (2컬럼: 시간+일정, 카드형)
  const thS = 'padding:8px 12px;font-size:11px;font-weight:700;color:#FFFFFF;background:#4A7A5A;border:1px solid #3A6A4A;white-space:nowrap';
  const daysHTML = (d.days || []).map((day, i) => {
    const dayLabel = dayLabels[i] || (i+1)+'일차';
    const items = day.items || [];
    const dayBorder = 'border-bottom:1px solid #D5D5D5';

    let dateStr = '';
    if (d.dateFrom) {
      const dt = new Date(d.dateFrom);
      dt.setDate(dt.getDate() + i);
      const dayNames = ['일','월','화','수','목','금','토'];
      dateStr = ' (' + (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + dayNames[dt.getDay()] + ')';
    }

    const itemRows = items.map((it, ri) => {
      const textStyle = it.color ? 'color:' + it.color + ';font-weight:700' : 'color:#222';
      const bgStyle = it.color ? 'background:' + it.color + '10' : (ri%2===0 ? '' : 'background:#FAFAF8');
      return '<tr style="' + bgStyle + '">' +
        '<td style="' + dayBorder + ';padding:8px 8px;font-size:12px;color:#A07840;font-weight:700;text-align:center;vertical-align:top">' + (it.time||'') + '</td>' +
        '<td style="' + dayBorder + ';padding:8px 14px;font-size:13px;' + textStyle + ';line-height:1.6;word-break:keep-all">' + (it.text||'') + '</td>' +
      '</tr>';
    }).join('');

    const hotelRow = day.hotelStay ? '<tr style="background:#F0F6FF"><td colspan="2" style="' + dayBorder + ';padding:8px 12px"><span style="display:inline-block;background:#1D4ED8;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:8px">HOTEL</span><span style="font-size:13px;font-weight:600;color:#1D4ED8">' + day.hotelStay + '</span></td></tr>' : '';

    return '<div style="border:1.5px solid #2A6B3C;border-radius:10px;overflow:hidden;margin-bottom:12px">' +
      '<div style="background:#2A4A5E;padding:10px 16px;font-size:14px;font-weight:800;color:white">' + dayLabel + dateStr + (day.title ? '&nbsp;&nbsp;' + day.title : '') + '</div>' +
      '<table style="width:100%;border-collapse:collapse;table-layout:fixed">' +
        '<colgroup><col style="width:58px"><col></colgroup>' +
        '<tr><th style="' + thS + ';text-align:center">시간</th><th style="' + thS + ';text-align:left;padding-left:14px">일정</th></tr>' +
        itemRows +
        hotelRow +
      '</table>' +
    '</div>';
  }).join('');

  // ── 포함/불포함
  const incHTML = (d.includes || []).map(t =>
    '<li style="font-size:13px;color:#333;padding:5px 0;border-bottom:1px solid #F0EFE9;display:flex;gap:8px;align-items:flex-start"><span style="color:#2C2C2C;font-weight:700;flex-shrink:0">✓</span>' + t + '</li>'
  ).join('');
  const excHTML = (d.excludes || []).map(t =>
    '<li style="font-size:13px;color:#333;padding:5px 0;border-bottom:1px solid #F0EFE9;display:flex;gap:8px;align-items:flex-start"><span style="color:#C0392B;font-weight:700;flex-shrink:0">✕</span>' + t + '</li>'
  ).join('');

  // ── 호텔 편의시설
  const hotelFacHTML = (d.hotelFacilities || []).map(f =>
    '<span style="font-size:12px;padding:5px 12px;background:#F0F4F2;border:1px solid #C8DDD4;border-radius:20px;color:#2C2C2C;font-weight:500">' + f + '</span>'
  ).join('');

  // ── 사진 그리드 HTML 헬퍼 (1~4장 반응형)
  function pgHTML(photos, h, emoji) {
    const p = (photos||[]).filter(u=>u);
    if (!p.length) return '<div style="width:100%;height:'+h+'px;background:linear-gradient(135deg,#A8C8A8,#4A7860);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.4))"></div><span style="position:relative">'+(emoji||'⛳')+'</span></div>';
    if (p.length===1) return '<img src="'+p[0]+'" style="width:100%;height:'+h+'px;object-fit:cover">';
    var subH = Math.round(h*0.6);
    if (p.length===2) return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px">'+p.map(function(u){return '<img src="'+u+'" style="width:100%;height:'+Math.round(h*0.75)+'px;object-fit:cover">';}).join('')+'</div>';
    if (p.length===3) return '<img src="'+p[0]+'" style="width:100%;height:'+h+'px;object-fit:cover"><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2px">'+p.slice(1).map(function(u){return '<img src="'+u+'" style="width:100%;height:'+subH+'px;object-fit:cover">';}).join('')+'</div>';
    return '<img src="'+p[0]+'" style="width:100%;height:'+h+'px;object-fit:cover"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-top:2px">'+p.slice(1,4).map(function(u){return '<img src="'+u+'" style="width:100%;height:'+subH+'px;object-fit:cover">';}).join('')+'</div>';
  }

  // ── 골프장
  const coursesHTML = (d.courses || []).map((c, i) => {
    const cPhotos = c.photos || (c.photoUrl ? [c.photoUrl] : []);
    const coursePhotoEl = pgHTML(cPhotos, 200, '⛳');
    const featArr = Array.isArray(c.features) ? c.features : (c.features||'').split(',').filter(Boolean);
    const featHTML = featArr.map(f =>
      '<span style="font-size:12px;padding:5px 12px;background:#F0F4F2;border:1px solid #C8DDD4;border-radius:20px;color:#2C2C2C;font-weight:500">' + f.trim() + '</span>'
    ).join('');
    return '<div style="border:1px solid #E8E6E1;border-radius:14px;overflow:hidden;background:white;margin-bottom:20px">' +
      '<div style="border-radius:14px 14px 0 0;overflow:hidden">' + coursePhotoEl + '</div>' +
      '<div style="padding:20px 18px 22px;text-align:center">' +
        (c.rating ? '<div style="font-size:11px;color:#A07840;font-weight:700;letter-spacing:1.5px;margin-bottom:8px">' + c.rating + '</div>' : '') +
        '<div style="font-family:Noto Serif KR,serif;font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:4px;line-height:1.3">' + (c.name||'') + '</div>' +
        '<div style="font-size:12px;color:#8A8A84;margin-bottom:6px">' + (c.nameJp||'') + (c.nameJp&&c.holes?' · ':'') + (c.holes||'') + '</div>' +
        '<div style="width:40px;height:1.5px;background:#C9A268;margin:14px auto;border-radius:2px"></div>' +
        (c.desc ? '<div style="font-size:13px;color:#555;line-height:1.9;text-align:left;padding:0 4px;margin-bottom:14px;word-break:keep-all">' + c.desc + '</div>' : '') +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">' + featHTML + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // ── 안내 메모
  const noteLines = (d.priceNote || '').split('\n').filter(Boolean).map(l => l + '<br>').join('');

  // ── 요금 옵션
  const extraPrices = [];
  if (d.priceNoFlight != null) extraPrices.push({label:'항공권 미포함 1인', amount: d.priceNoFlight});
  if (d.priceChild != null) extraPrices.push({label:'아동 1인', amount: d.priceChild});
  if (d.priceInfant != null) extraPrices.push({label:'유아 1인', amount: d.priceInfant});

  // ── 호텔 사진 (멀티)
  const hotelPhotoEl = pgHTML(d.hotelPhotos || (d.hotelPhotoUrl ? [d.hotelPhotoUrl] : []), 200, '🏨');

  // ── 뱃지 스타일
  const badgeS = 'display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:rgba(255,255,255,0.12);border-radius:20px;font-size:12px;color:white;font-weight:500';

  // ── 상품요약 행 생성 헬퍼
  function summaryRow(label, value, isLast) {
    const bb = isLast ? '' : 'border-bottom:1px solid #D5D5D5;';
    return '<div style="display:flex;' + bb + '">' +
      '<div style="min-width:76px;padding:10px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">' + label + '</div>' +
      '<div style="flex:1;padding:10px 14px;font-size:13px;color:#111">' + (value||'-') + '</div>' +
    '</div>';
  }

  // ============== 렌더링 시작 ==============
  wrap.innerHTML = `
    <!-- HEADER -->
    <header style="border-bottom:1px solid #E8E6E1;position:sticky;top:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);z-index:100">
      <div style="padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EDE8">
        ${d.logoUrl
          ? '<img src="' + d.logoUrl + '" style="height:40px;display:block" alt="초이스골프">'
          : '<div style="display:flex;align-items:center;gap:8px"><div style="width:36px;height:36px;border-radius:8px;background:#2C2C2C;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#C9A268;flex-shrink:0">CG</div><div><div style="font-size:14px;font-weight:700;color:#111">' + (d.companyName||'초이스골프') + '</div><div style="font-size:9px;color:#444;letter-spacing:2px;text-transform:uppercase">' + (d.companyNameEn||'Choice Golf Tour') + '</div></div></div>'
        }
        <div style="font-size:11px;font-weight:600;color:#2C2C2C;letter-spacing:1px;border:1.5px solid #2C2C2C;padding:4px 12px;border-radius:20px">견적서</div>
      </div>
    </header>

    <!-- HERO -->
    <div class="hero reveal" style="padding:36px 24px 28px;border-bottom:1px solid #E8E6E1;background:#2C2C2C;text-align:center">
      ${d.travelDest ? '<div style="font-size:15px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,0.6);margin-bottom:12px">' + d.travelDest + '</div>' : ''}
      <div style="font-family:Noto Serif KR,serif;font-size:clamp(20px,5.5vw,28px);font-weight:700;color:white;line-height:1.35;word-break:keep-all">${d.destination||''}</div>
      <div style="width:60%;max-width:200px;height:1.5px;background:rgba(255,255,255,0.2);margin:20px auto 18px;border-radius:2px"></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${d.period ? '<span style="' + badgeS + '">📅 ' + d.period + '</span>' : ''}
        ${d.nights ? '<span style="' + badgeS + '">🌙 ' + d.nights + '박 ' + (parseInt(d.nights)+1) + '일</span>' : ''}
        ${paxText ? '<span style="' + badgeS + '">👥 ' + paxText + '</span>' : ''}
        ${d.customerName ? '<span style="' + badgeS + '">👤 ' + d.customerName + '님</span>' : ''}
        ${d.agent ? '<span style="' + badgeS + '">📋 담당: ' + d.agent + '</span>' : ''}
      </div>
    </div>

    <!-- 01 상품 요약 -->
    <section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1">
      <div class="sec-title">01 &nbsp;상품 요약</div>

      <div style="border:2px solid #2A4A5E;border-radius:10px;overflow:hidden;font-family:'Noto Sans KR',sans-serif">
        ${d.customerName ? '<div style="display:flex;border-bottom:1px solid #D5D5D5"><div style="min-width:76px;padding:10px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">고객명</div><div style="flex:1;padding:10px 14px;font-size:14px;font-weight:600;color:#111">' + d.customerName + '</div><div style="min-width:56px;padding:10px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">인원</div><div style="min-width:70px;padding:10px 12px;font-size:14px;color:#111">' + (paxText||'-') + '</div></div>' : ''}
        <div style="display:flex;border-bottom:1px solid #D5D5D5">
          <div style="min-width:76px;padding:10px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">항공</div>
          <div style="flex:1;padding:10px 14px;font-size:13px;color:#111">${d.airlineName||'-'}</div>
        </div>
        ${(d.hotelQuickName||d.hotelName) ? '<div style="display:flex;border-bottom:1px solid #D5D5D5"><div style="min-width:76px;padding:10px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">호텔</div><div style="flex:1;padding:10px 14px;font-size:13px;color:#111">' + (d.hotelQuickName||d.hotelName||'') + '</div></div>' : ''}
        ${d.agent ? '<div style="display:flex;border-bottom:1px solid #D5D5D5"><div style="min-width:76px;padding:10px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">담당자</div><div style="flex:1;padding:10px 14px;font-size:13px;color:#111">' + d.agent + '</div></div>' : ''}
        <div style="display:flex">
          <div style="min-width:76px;padding:12px 12px;font-size:12px;font-weight:700;color:#FFF;background:#2A4A5E">요금</div>
          <div style="flex:1;padding:12px 14px;font-size:20px;font-weight:800;color:#C0392B">₩${perPerson} / 인</div>
        </div>
      </div>

      ${extraPrices.length ? '<div style="border:1px solid #E8E6E1;border-radius:12px;overflow:hidden;margin-top:14px">' + extraPrices.map((ep,i) => '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #E8E6E1;background:' + (i%2===0?'white':'#FAFAF8') + '"><div style="font-size:13px;color:#111">' + ep.label + '</div><div style="font-size:15px;font-weight:600;color:#111;font-variant-numeric:tabular-nums">₩' + Number(ep.amount).toLocaleString() + '</div></div>').join('') + '</div>' : ''}

      ${noteLines ? '<div style="padding:12px 14px;background:#FFF9F0;border-left:2.5px solid #C9A268;border-radius:0 8px 8px 0;font-size:12px;color:#444;line-height:1.8;margin-top:14px">' + noteLines + '</div>' : ''}

      <!-- 포함 / 불포함 -->
      ${incHTML || excHTML ? '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px"><div style="border-radius:12px;padding:16px;border:1px solid #E5E5E5;background:#F3FAF6"><div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#2C2C2C;margin-bottom:12px">✓ 포함</div><ul style="list-style:none">' + incHTML + '</ul></div><div style="border-radius:12px;padding:16px;border:1px solid #DFCAC9;background:#FDF4F4"><div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#C0392B;margin-bottom:12px">✕ 불포함</div><ul style="list-style:none">' + excHTML + '</ul></div></div>' : ''}
    </section>

    <!-- 02 일정표 -->
    <section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1;background:#F8F7F5">
      <div class="sec-title">02 &nbsp;상세 일정표</div>
      ${daysHTML}
    </section>

    <!-- 03 호텔 -->
    ${d.hotelName ? '<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1"><div class="sec-title">03 &nbsp;숙박 호텔</div><div style="border:1px solid #E8E6E1;border-radius:14px;overflow:hidden;background:white"><div style="border-radius:14px 14px 0 0;overflow:hidden">' + hotelPhotoEl + '</div><div style="padding:20px 18px 22px;text-align:center">' + (starsStr ? '<div style="font-size:13px;color:#A07840;font-weight:700;letter-spacing:2px;margin-bottom:8px">' + starsStr + '</div>' : '') + '<div style="font-family:Noto Serif KR,serif;font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:4px;line-height:1.3">' + (d.hotelName||'') + '</div><div style="font-size:12px;color:#8A8A84;margin-bottom:6px">' + (d.hotelNameKr||'') + ((d.hotelNameKr&&d.hotelRoom)?' · ':'') + (d.hotelRoom||'') + '</div><div style="width:40px;height:1.5px;background:#C9A268;margin:14px auto;border-radius:2px"></div>' + (d.hotelDesc ? '<div style="font-size:13px;color:#555;line-height:1.9;text-align:left;padding:0 4px;margin-bottom:14px;word-break:keep-all">' + d.hotelDesc + '</div>' : '') + '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">' + hotelFacHTML + '</div></div></div></section>' : ''}

    <!-- 04 골프장 -->
    ${coursesHTML ? '<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1;background:#F8F7F5"><div class="sec-title">04 &nbsp;라운드 코스</div>' + coursesHTML + '</section>' : ''}

    <!-- REMARK 참고 사항 -->
    ${d.remark ? '<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1"><div class="sec-title">📌 &nbsp;참고 사항</div><div style="border:1px solid #E8E6E1;border-radius:12px;padding:18px 20px;background:#FFFBF2;border-left:3px solid #C9A268;font-size:13px;color:#444;line-height:2">' + (d.remark||'').replace(/\n/g,'<br>') + '</div></section>' : ''}

    <!-- 05 예약 안내 -->
    ${(d.deposit || d.bankAccount || d.cancelPolicy) ? '<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1"><div class="sec-title">05 &nbsp;예약 안내</div>' + (d.deposit ? '<div style="border:1px solid #E8E6E1;border-radius:12px;padding:16px;margin-bottom:12px;background:#FAFAF8"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#888;margin-bottom:8px">예약금</div><div style="font-size:18px;font-weight:700;color:#C0392B">' + d.deposit + '</div></div>' : '') + (d.bankAccount ? '<div style="border:1px solid #E8E6E1;border-radius:12px;padding:16px;margin-bottom:12px;background:#FAFAF8"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#888;margin-bottom:8px">입금 계좌</div><div style="font-size:14px;font-weight:600;color:#111;line-height:1.8">' + (d.bankAccount||'').replace(/\n/g,'<br>') + '</div></div>' : '') + (d.cancelPolicy ? '<div style="border:1px solid #E8E6E1;border-radius:12px;padding:16px;margin-bottom:12px;background:#FFF9F0"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#8B6020;margin-bottom:10px">취소 및 환불 규정</div><div style="font-size:12px;color:#444;line-height:1.9">' + (d.cancelPolicy||'').replace(/\n/g,'<br>') + '</div></div>' : '') + '</section>' : ''}

    <!-- 06 문의 -->
    <div class="contact-sec reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1">
      <div class="sec-title">06 &nbsp;문의 · 예약</div>
      <div style="border:1px solid #E8E6E1;border-radius:14px;overflow:hidden">
        <a href="tel:${d.contactPhone||''}" style="display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid #E8E6E1;text-decoration:none;color:inherit">
          <div style="width:40px;height:40px;border-radius:10px;background:#E8F2EC;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📞</div>
          <div><div style="font-size:11px;color:#8A8A84;margin-bottom:3px">전화 문의</div><div style="font-size:15px;font-weight:700;color:#111">${d.contactPhone||''}</div></div>
          <div style="margin-left:auto;color:#8A8A84;font-size:20px">›</div>
        </a>
        <div style="display:flex;align-items:center;gap:14px;padding:16px 18px">
          <div style="width:40px;height:40px;border-radius:10px;background:#FEE500;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">💬</div>
          <div><div style="font-size:11px;color:#8A8A84;margin-bottom:3px">카카오톡 채널</div><div style="font-size:15px;font-weight:700;color:#111">${d.contactKakao||''}</div></div>
          <div style="margin-left:auto;color:#8A8A84;font-size:20px">›</div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer style="padding:28px 20px 80px;text-align:center;background:#2C2C2C">
      <div style="font-size:16px;font-weight:700;color:white;margin-bottom:4px">${d.companyName||'초이스골프'}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">${d.companyNameEn||'Choice Golf Tour'}</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.5);line-height:2">
        <span style="font-weight:600;color:rgba(255,255,255,0.7)">(주)초이스골프</span>&nbsp;|&nbsp;☎ 1533-3160 / 02-545-5055<br>
        사업자등록 594-88-03010&nbsp;|&nbsp;관광사업 제2025-000011호<br>
        통신판매업 제2025-서울중구-213호
        ${d.quoteDate ? '<br>견적발송일: ' + d.quoteDate : ''}
      </div>
    </footer>

    <!-- SHARE BAR -->
    <div class="share-bar" style="position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-top:1px solid #E8E6E1;padding:12px 20px 20px;display:flex;gap:10px;z-index:200;box-sizing:border-box">
      <button onclick="shareKakao()" class="share-btn" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;flex:1;background:#FEE500;color:#3A1D1D;font-family:'Noto Sans KR',sans-serif">💬 카카오톡 공유</button>
      <button onclick="copyLink()" class="share-btn" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;flex:1;background:#2C2C2C;color:white;font-family:'Noto Sans KR',sans-serif">🔗 링크 복사</button>
    </div>
  `;

  wrap.style.display = 'block';
  document.getElementById('loadingScreen').classList.add('hide');

  setTimeout(() => {
    const io = new IntersectionObserver(e => e.forEach(x => {
      if (x.isIntersecting) { x.target.classList.add('visible'); io.unobserve(x.target); }
    }), { threshold: .06 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }, 100);
}

function copyLink() {
  const url = window.location.href;
  if (navigator.clipboard) { navigator.clipboard.writeText(url).then(showToast); }
  else {
    const t = document.createElement('textarea');
    t.value = url; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t); showToast();
  }
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}
function shareKakao() {
  if (navigator.share) {
    const title = document.title;
    navigator.share({ title, text: '골프투어 견적서를 확인하세요!', url: window.location.href });
  } else { copyLink(); }
}
</script>
</body>
</html>
