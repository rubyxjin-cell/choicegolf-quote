<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>мҙҲмқҙмҠӨкіЁн”„ вҖ” кіЁн”„нҲ¬м–ҙ кІ¬м Ғм„ң</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;600&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fff;--off:#F8F7F5;--line:#E8E6E1;--line2:#D4D1CA;--ink:#111110;--ink2:#4A4A46;--ink3:#8A8A84;--accent:#2C2C2C;--navy:#2A4A5E;--green:#4A7A5A;--gold:#A07840;--gold-lt:#C9A268;--red:#8B2E2E;--red2:#C0392B}
html{scroll-behavior:smooth}
body{background:#DDDBD5;font-family:'Noto Sans KR',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;color:var(--ink);padding-bottom:80px}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s ease}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold-lt);letter-spacing:1px;margin-bottom:16px}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);animation:dot 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}

/* ERROR */
.error-screen{display:none;position:fixed;inset:0;background:var(--off);flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:998}
.error-screen.show{display:flex}
.error-icon{font-size:48px}
.error-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--ink)}
.error-desc{font-size:13px;color:var(--ink3)}

/* LAYOUT */
.wrap{background:var(--white);max-width:500px;margin:0 auto;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,0.10)}

@media(min-width:768px){
  body{padding:40px 24px 0;padding-bottom:0!important}
  .wrap{max-width:540px;border-radius:20px;overflow:hidden;min-height:auto;box-shadow:0 20px 80px rgba(0,0,0,0.14)}
  section,.contact-sec{padding:48px 40px!important}
  .share-bar{position:static!important;padding:16px 40px 24px!important;border-top:1px solid var(--line)!important}
  .share-btn{flex:0 0 auto!important;padding:12px 28px!important}
}

/* HEADER */
.site-header{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,0.94);backdrop-filter:blur(14px);z-index:100}
.logo-box{width:40px;height:40px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold-lt);flex-shrink:0;overflow:hidden}
.logo-box img{width:100%;height:100%;object-fit:cover}

/* SECTION */
section,.contact-sec{padding:44px 20px;border-bottom:1px solid var(--line)}
.sec-title{font-size:14px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#111;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:#E8E6E1}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--off);border-radius:20px;font-size:12px;color:var(--ink2);border:1px solid var(--line)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13px;padding:10px 22px;border-radius:24px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHARE BAR */
.share-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:12px 20px 24px;display:flex;gap:10px;z-index:200}
.share-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:500;border:none;cursor:pointer;flex:1;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s,transform .1s}
.share-btn:active{opacity:.8;transform:scale(.98)}
.btn-kakao{background:#FEE500;color:#3A1D1D}
.btn-link{background:var(--accent);color:white}


</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Choice Golf</div>
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>

</div>

<!-- CONTENT (JSк°Җ мұ„мӣҢмӨҢ) -->
<div class="wrap" id="mainWrap" style="display:none"></div>

<div class="toast" id="toast">л§ҒнҒ¬к°Җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ вң“</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

/* в•җв•җв•җ мғүмғҒ нғңк·ё нҢҢм„ң: [л№Ёк°•]н…ҚмҠӨнҠё[л№Ёк°•] вҶ’ л№Ёк°„мғү н…ҚмҠӨнҠё в•җв•җв•җ */
const COLOR_TAG_MAP = {
  'л№Ёк°•':'#E53E3E','л№Ёк°„':'#E53E3E','л№Ёк°„мғү':'#E53E3E','л Ҳл“ң':'#E53E3E','red':'#E53E3E',
  'нҢҢлһ‘':'#2563EB','нҢҢлһҖ':'#2563EB','нҢҢлһҖмғү':'#2563EB','лё”лЈЁ':'#2563EB','blue':'#2563EB',
  'мҙҲлЎқ':'#059669','мҙҲлЎқмғү':'#059669','л…№мғү':'#059669','к·ёлҰ°':'#059669','green':'#059669',
  'л…ёлһ‘':'#D97706','л…ёлһҖ':'#D97706','л…ёлһҖмғү':'#D97706','мҳҗлЎңмҡ°':'#D97706','yellow':'#D97706',
  'мЈјнҷ©':'#EA580C','мЈјнҷ©мғү':'#EA580C','мҳӨл Ңм§Җ':'#EA580C','orange':'#EA580C',
  'ліҙлқј':'#7C3AED','ліҙлқјмғү':'#7C3AED','нҚјн”Ң':'#7C3AED','purple':'#7C3AED',
  'л¶„нҷҚ':'#EC4899','л¶„нҷҚмғү':'#EC4899','н•‘нҒ¬':'#EC4899','pink':'#EC4899',
  'н•ҳлҠҳ':'#0EA5E9','н•ҳлҠҳмғү':'#0EA5E9','cyan':'#0EA5E9',
  'к°Ҳмғү':'#92400E','лёҢлқјмҡҙ':'#92400E','brown':'#92400E',
  'нҡҢмғү':'#6B7280','к·ёл Ҳмқҙ':'#6B7280','gray':'#6B7280',
};
function parseColorTags(text) {
  if (!text) return text || '';
  return text.replace(/\[([^\]]+?)\](.+?)\[\1\]/g, (m, tag, content) => {
    const hex = COLOR_TAG_MAP[tag.toLowerCase()] || COLOR_TAG_MAP[tag];
    return hex ? '<span style="color:'+hex+';font-weight:700">'+content+'</span>' : m;
  });
}

/* в”Җв”Җ URLм—җм„ң id м¶”м¶ң в”Җв”Җ */
const params = new URLSearchParams(window.location.search);
const quoteId = params.get('id');

if (!quoteId) {
  showError();
} else {
  fetchQuote(quoteId);
}

async function fetchQuote(id) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}&select=data`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const rows = await res.json();
    if (!rows || rows.length === 0) { showError(); return; }
    let d = rows[0].data;
    if (typeof d === "string") { try { d = JSON.parse(d); } catch(e) { showError(); return; } }
    if (!d.category && rows[0].category) d.category = rows[0].category;
    document.title = `${d.companyName} вҖ” ${d.destination} кіЁн”„нҲ¬м–ҙ`;
    renderPage(d);
  } catch(e) {
    showError();
  }
}

function showError() {
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('errorScreen').classList.add('show');
}

function renderPage(d) {
  if (d.docType === 'confirmation') { renderConfirmation(d); return; }
  const wrap = document.getElementById('mainWrap');

  // в”Җв”Җ мқёмӣҗ н‘ңкё°
  const paxText = d.pax || '';

  // в”Җв”Җ мҡ”кёҲ н‘ңкё°
  const pp = d.pricePerPerson || 0;
  const perPerson = pp ? pp.toLocaleString() : 'вҖ”';

  // в”Җв”Җ лі„м җ
  const starsStr = d.hotelStars ? 'вҳ…'.repeat(parseInt(d.hotelStars)) : '';

  // в”Җв”Җ көӯкё°
  const CFI = {'мқјліё':'jp','мӨ‘көӯ':'cn','лҢҖл§Ң':'tw','нғңкөӯ':'th','лІ нҠёлӮЁ':'vn','н•„лҰ¬н•Җ':'ph','мқёлҸ„л„ӨмӢңм•„':'id','л§җл ҲмқҙмӢңм•„':'my','мә„ліҙл””м•„':'kh','лҜёкөӯ':'us','нҳёмЈј':'au','мӢұк°ҖнҸ¬лҘҙ':'sg'};
  const cfCode = CFI[d.category] || '';
  const countryFlag = cfCode ? '<img src="https://flagcdn.com/w40/' + cfCode + '.png" style="height:20px;vertical-align:middle;border-radius:2px;margin-right:4px" alt="">' : '';

  // в”Җв”Җ лӮ м§ң кі„мӮ°мҡ©
  const dayLabels = ['1мқјм°Ё','2мқјм°Ё','3мқјм°Ё','4мқјм°Ё','5мқјм°Ё','6мқјм°Ё','7мқјм°Ё','8мқјм°Ё','9мқјм°Ё','10мқјм°Ё'];

  // в”Җв”Җ мқјм •н‘ң HTML (2м»¬лҹј: мӢңк°„+мқјм •, м№ҙл“ңнҳ•)
  const thS = 'padding:8px 12px;font-size:11px;font-weight:700;color:#FFFFFF;background:#4A7A5A;border:1px solid #3A6A4A;white-space:nowrap';
  const daysHTML = (d.days || []).map((day, i) => {
    const dayLabel = dayLabels[i] || (i+1)+'мқјм°Ё';
    const items = day.items || [];
    const dayBorder = 'border-bottom:1px solid #D5D5D5';

    let dateStr = '';
    if (d.dateFrom) {
      const dt = new Date(d.dateFrom);
      dt.setDate(dt.getDate() + i);
      const dayNames = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
      dateStr = ' (' + (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + dayNames[dt.getDay()] + ')';
    }

    const itemRows = items.map((it, ri) => {
      const bgStyle = ri%2===0 ? '' : 'background:#FAFAF8';
      return '<tr style="' + bgStyle + '">' +
        '<td style="' + dayBorder + ';padding:8px 8px;font-size:12px;color:#A07840;font-weight:700;text-align:center;vertical-align:top">' + (it.time||'') + '</td>' +
        '<td style="' + dayBorder + ';padding:8px 14px;font-size:13px;font-weight:700;color:#222;line-height:1.6;word-break:keep-all">' + parseColorTags(it.text||'') + '</td>' +
      '</tr>';
    }).join('');

    // мӢқмӮ¬ м •ліҙ л ҢлҚ”л§Ғ
    const meals = day.meals || {};
    const mealItems = [];
    if(meals.bf) mealItems.push('рҹҚі ' + meals.bf);
    if(meals.lunch) mealItems.push('рҹҚң ' + meals.lunch);
    if(meals.dinner) mealItems.push('рҹҚҪ ' + meals.dinner);
    const mealRow = mealItems.length ? '<tr><td colspan="2" style="padding:10px 14px;background:#FFF9F0;border-top:1.5px solid #E8C97A;font-size:12px;color:#92400E;font-weight:700">' + mealItems.join(' &nbsp;в”Ӯ&nbsp; ') + '</td></tr>' : '';

    // нҳён…” м •ліҙ (кі кёү н…Ңл‘җлҰ¬)
    const hotelRow = day.hotelStay ? '<tr><td colspan="2" style="padding:0"><div style="margin:8px 10px;border:2px solid #1D4ED8;border-radius:8px;padding:10px 14px;background:#F0F6FF;display:flex;align-items:center;gap:8px"><span style="display:inline-block;background:#1D4ED8;color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:1px">HOTEL</span><span style="font-size:13px;font-weight:700;color:#1D4ED8">' + day.hotelStay + '</span></div></td></tr>' : '';

    return '<div style="border:1.5px solid #2A6B3C;border-radius:10px;overflow:hidden;margin-bottom:12px">' +
      '<div style="background:#2A4A5E;padding:10px 16px;font-size:14px;font-weight:800;color:white">' + dayLabel + dateStr + (day.title ? '&nbsp;&nbsp;' + day.title : '') + '</div>' +
      '<table style="width:100%;border-collapse:collapse;table-layout:fixed">' +
        '<colgroup><col style="width:58px"><col></colgroup>' +
        '<tr><th style="' + thS + ';text-align:center">мӢңк°„</th><th style="' + thS + ';text-align:center">мқјм •</th></tr>' +
        itemRows +
        mealRow +
        hotelRow +
      '</table>' +
    '</div>';
  }).join('');

  // в”Җв”Җ нҸ¬н•Ё/л¶ҲнҸ¬н•Ё
  const incHTML = (d.includes || []).map(t =>
    '<li style="font-size:13px;font-weight:600;color:#000;padding:6px 0;border-bottom:1px solid rgba(42,74,94,0.15)">В· ' + parseColorTags(t) + '</li>'
  ).join('');
  const excHTML = (d.excludes || []).map(t =>
    '<li style="font-size:13px;font-weight:600;color:#000;padding:6px 0;border-bottom:1px solid rgba(192,57,43,0.15)">В· ' + parseColorTags(t) + '</li>'
  ).join('');

  // в”Җв”Җ нҳён…” нҺёмқҳмӢңм„Ө
  const hotelFacHTML = (d.hotelFacilities || []).map(f =>
    '<span style="font-size:12px;padding:5px 12px;background:#F0F4F2;border:1px solid #C8DDD4;border-radius:20px;color:#2C2C2C;font-weight:500">' + f + '</span>'
  ).join('');

  // в”Җв”Җ мӮ¬м§„ к·ёлҰ¬л“ң HTML н—¬нҚј (1~4мһҘ л°ҳмқ‘нҳ•)
  function pgHTML(photos, h, emoji) {
    const p = (photos||[]).filter(u=>u);
    if (!p.length) return '<div style="width:100%;height:'+h+'px;background:linear-gradient(135deg,#A8C8A8,#4A7860);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.4))"></div><span style="position:relative">'+(emoji||'вӣі')+'</span></div>';
    if (p.length===1) return '<img src="'+p[0]+'" style="width:100%;height:'+h+'px;object-fit:cover">';
    var subH = Math.round(h*0.6);
    if (p.length===2) return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px">'+p.map(function(u){return '<img src="'+u+'" style="width:100%;height:'+Math.round(h*0.75)+'px;object-fit:cover">';}).join('')+'</div>';
    if (p.length===3) return '<img src="'+p[0]+'" style="width:100%;height:'+h+'px;object-fit:cover"><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2px">'+p.slice(1).map(function(u){return '<img src="'+u+'" style="width:100%;height:'+subH+'px;object-fit:cover">';}).join('')+'</div>';
    return '<img src="'+p[0]+'" style="width:100%;height:'+h+'px;object-fit:cover"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-top:2px">'+p.slice(1,4).map(function(u){return '<img src="'+u+'" style="width:100%;height:'+subH+'px;object-fit:cover">';}).join('')+'</div>';
  }

  // в”Җв”Җ кіЁн”„мһҘ
  const coursesHTML = (d.courses || []).map((c, i) => {
    const cPhotos = c.photos || (c.photoUrl ? [c.photoUrl] : []);
    const coursePhotoEl = pgHTML(cPhotos, 200, 'вӣі');
    const featArr = Array.isArray(c.features) ? c.features : (c.features||'').split(',').filter(Boolean);
    const featHTML = featArr.map(f =>
      '<span style="font-size:12px;padding:5px 12px;background:#F0F4F2;border:1px solid #C8DDD4;border-radius:20px;color:#2C2C2C;font-weight:500">' + f.trim() + '</span>'
    ).join('');
    return '<div style="border:2px solid #2A4A5E;border-radius:14px;overflow:hidden;background:white;margin-bottom:20px;box-shadow:0 2px 12px rgba(42,74,94,0.08)">' +
      '<div style="border-radius:14px 14px 0 0;overflow:hidden">' + coursePhotoEl + '</div>' +
      '<div style="padding:20px 18px 22px;text-align:center">' +
        (c.rating ? '<div style="font-size:11px;color:#A07840;font-weight:700;letter-spacing:1.5px;margin-bottom:8px">' + c.rating + '</div>' : '') +
        '<div style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:2px;line-height:1.3;letter-spacing:0.5px">' + (c.name||'') + '</div>' +
        '<div style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px;line-height:1.3">' + (c.nameKr||c.nameJp||'') + '</div>' +
        (c.holes ? '<div style="font-size:12px;font-weight:500;color:#666;margin-bottom:4px">' + c.holes + '</div>' : '') +
        '<div style="width:40px;height:1.5px;background:#C9A268;margin:14px auto;border-radius:2px"></div>' +
        (c.desc ? '<div style="font-size:13px;color:#000;font-weight:500;line-height:1.9;text-align:left;padding:0 4px;margin-bottom:14px;word-break:keep-all">' + parseColorTags(c.desc) + '</div>' : '') +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">' + featHTML + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // в”Җв”Җ м•ҲлӮҙ л©”лӘЁ
  const noteLines = (d.priceNote || '').split('\n').filter(Boolean).map(l => l + '<br>').join('');

  // в”Җв”Җ мҡ”кёҲ мҳөм…ҳ
  const extraPrices = [];
  if (d.priceNoFlight != null) extraPrices.push({label:'н•ӯкіөк¶Ң лҜёнҸ¬н•Ё 1мқё', amount: d.priceNoFlight});
  if (d.priceChild != null) extraPrices.push({label:'м•„лҸҷ 1мқё', amount: d.priceChild});
  if (d.priceInfant != null) extraPrices.push({label:'мң м•„ 1мқё', amount: d.priceInfant});

  // в”Җв”Җ нҳён…” мӮ¬м§„ (л©ҖнӢ°)
  const hotelPhotoEl = pgHTML(d.hotelPhotos || (d.hotelPhotoUrl ? [d.hotelPhotoUrl] : []), 200, 'рҹҸЁ');

  // в”Җв”Җ лұғм§Җ мҠӨнғҖмқј
  const badgeS = 'display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:rgba(255,255,255,0.12);border-radius:20px;font-size:12px;color:white;font-weight:500';

  // в”Җв”Җ мғҒн’Ҳмҡ”м•Ҫ н–ү мғқм„ұ н—¬нҚј
  function summaryRow(label, value, isLast) {

function copyLink() {
  const url = window.location.href;
  if (navigator.clipboard) { navigator.clipboard.writeText(url).then(showToast); }
  else {
    const t = document.createElement('textarea');
    t.value = url; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t); showToast();
  }
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}
function shareKakao() {
  if (navigator.share) {
    const title = document.title;
    navigator.share({ title, text: 'кіЁн”„нҲ¬м–ҙ нҷ•м •м„ңлҘј нҷ•мқён•ҳм„ёмҡ”!', url: window.location.href });
  } else { copyLink(); }
}

      badgeRow+
      '<table style="width:100%;border-collapse:collapse;table-layout:fixed"><colgroup><col style="width:58px"><col></colgroup>'+
      '<tr><th style="'+thS+';text-align:center">мӢңк°„</th><th style="'+thS+';text-align:left;padding-left:14px">мқјм •</th></tr>'+
      items+mealRow+'</table></div>';
  }).join('');

  // в”Җв”Җ лӮ м”Ё
  const weatherHTML=(d.weather||[]).filter(Boolean).length?
    '<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1"><div class="sec-title">02 &nbsp;лӮ м”Ё м •ліҙ</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;text-align:center">'+(d.weather||[]).map((w,i)=>{
      let ds='Day '+(i+1);if(d.dateFrom){const dt=new Date(d.dateFrom);dt.setDate(dt.getDate()+i);ds=(dt.getMonth()+1)+'/'+dt.getDate()+' '+dayNames[new Date(d.dateFrom).getDay()];}
      return '<div style="border:1px solid #E8E6E1;border-radius:10px;padding:12px 6px;background:white"><div style="font-size:10px;color:#888;font-weight:600;margin-bottom:4px">Day '+(i+1)+'</div><div style="font-size:14px;font-weight:700;color:#111">'+(w||'-')+'</div></div>';
    }).join('')+'</div></section>':'';

  // в”Җв”Җ м•ҲлӮҙл¬ё
  function gCard(icon,title,content){
    if(!content)return '';
    return '<div style="border:1px solid #E8E6E1;border-radius:12px;padding:16px;margin-bottom:12px;background:white"><div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:#A07840;margin-bottom:8px">'+icon+' '+title+'</div><div style="font-size:13px;color:#222;line-height:1.9;font-weight:500;word-break:keep-all">'+parseColorTags(content.replace(/\n/g,'<br>'))+'</div></div>';
  }
  const guideHTML=(d.airportGuide||d.transportGuide||d.cautions||d.extraGuide)?
    '<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1"><div class="sec-title">03 &nbsp;нҳ„м§Җ м•ҲлӮҙл¬ё</div>'+
    gCard('вңҲпёҸ','кіөн•ӯ м•ҲлӮҙ',d.airportGuide)+gCard('рҹҡҢ','көҗнҶө м•ҲлӮҙ',d.transportGuide)+gCard('вҡ пёҸ','мЈјмқҳмӮ¬н•ӯ',d.cautions)+gCard('рҹ“қ','кё°нғҖ м•ҲлӮҙ',d.extraGuide)+'</section>':'';

  // в”Җв”Җ кёҙкёүм—°лқҪмІҳ
  const ci=[];
  if(d.guideName||d.guidePhone) ci.push('<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F0F0F0"><span style="font-weight:600;color:#111">рҹ§‘вҖҚвңҲпёҸ нҳ„м§Җ к°Җмқҙл“ң</span><span style="color:#1B5E20;font-weight:700">'+(d.guideName||'')+' '+(d.guidePhone||'')+'</span></div>');
  if(d.localEmergency) ci.push('<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F0F0F0"><span style="font-weight:600;color:#111">рҹҶҳ нҳ„м§Җ кёҙкёү</span><span style="color:#C0392B;font-weight:700">'+d.localEmergency+'</span></div>');
  if(d.krEmergency) ci.push('<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F0F0F0"><span style="font-weight:600;color:#111">рҹ“һ н•ңкөӯ л№„мғҒ</span><span style="font-weight:700">'+d.krEmergency+'</span></div>');
  if(d.embassy) ci.push('<div style="display:flex;justify-content:space-between;padding:12px 0"><span style="font-weight:600;color:#111">рҹҸӣ лҢҖмӮ¬кҙҖ</span><span style="font-weight:700">'+d.embassy+'</span></div>');
  const contactHTML=ci.length?'<section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1"><div class="sec-title">04 &nbsp;кёҙкёү м—°лқҪмІҳ</div><div style="border:1.5px solid #C0392B;border-radius:12px;padding:16px;background:#FDF6F6;font-size:13px">'+ci.join('')+'</div></section>':'';

  wrap.innerHTML = `
    <header style="border-bottom:1px solid #E8E6E1;position:sticky;top:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);z-index:100">
      <div style="padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EDE8">
        ${logoEl}
        <div style="font-size:11px;font-weight:600;color:#1B5E20;letter-spacing:1px;border:1.5px solid #1B5E20;padding:4px 12px;border-radius:20px">нҷ•м •м„ң</div>
      </div>
    </header>

    <div class="hero reveal" style="padding:40px 24px 30px;border-bottom:1px solid #E8E6E1;background:linear-gradient(135deg,#1B2838,#2A4A5E);text-align:center">
      <div style="font-family:'Gaegu',cursive;font-size:18px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.85);margin-bottom:14px">вң… м¶ңл°ң нҷ•м •м„ң</div>
      <div style="font-family:'Noto Serif KR',serif;font-size:clamp(20px,5.5vw,28px);font-weight:700;color:white;line-height:1.35;word-break:keep-all">${parseColorTags(d.destination||'')}</div>
      <div style="width:60%;max-width:200px;height:1.5px;background:rgba(255,255,255,0.25);margin:20px auto 18px;border-radius:2px"></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${d.dateFrom ? '<span style="'+badgeS+'">рҹ“… '+d.dateFrom+'</span>' : ''}
        ${periodStr ? '<span style="'+badgeS+'">рҹҢҷ '+periodStr+'</span>' : ''}
        ${d.customer ? '<span style="'+badgeS+'">рҹ‘Ө '+d.customer+(d.pax?' В· '+d.pax:'')+'</span>' : ''}
      </div>
    </div>

    <section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1">
      <div class="sec-title">00 &nbsp;м—¬н–ү м •ліҙ</div>
      <div style="border:2px solid #2A4A5E;border-radius:10px;overflow:hidden">
        ${sumRow('кі к°қлӘ…',d.customer)}
        ${sumRow('н•ӯкіө',d.airline)}
        ${sumRow('нҳён…”',d.hotel)}
        ${sumRow('к°Җмқҙл“ң',(d.guideName?d.guideName+' ':'')+d.guidePhone, !d.contactPhone)}
        ${sumRow('лӢҙлӢ№мһҗ',d.contactPhone, true)}
      </div>
    </section>

    <section class="reveal" style="padding:36px 20px;border-bottom:1px solid #E8E6E1;background:#F8F7F5">
      <div class="sec-title">01 &nbsp;нҷ•м • мқјм •н‘ң</div>
      ${daysHTML}
    </section>

    ${weatherHTML}
    ${guideHTML}
    ${contactHTML}

    <section class="reveal" style="padding:36px 20px;text-align:center;background:#1B2838">
      <div style="margin-bottom:12px">${d.logoUrl?'<img src="'+d.logoUrl+'" style="height:36px;border-radius:6px">':'<div style="font-family:Cormorant Garamond,serif;font-size:20px;font-weight:600;color:#C9A268;letter-spacing:1px">'+(d.companyName||'мҙҲмқҙмҠӨкіЁн”„')+'</div>'}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px">${d.companyNameEn||'Choice Golf Tour'}</div>
      ${d.contactPhone?'<div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,0.7)">рҹ“һ '+d.contactPhone+'</div>':''}
    </section>

    <div style="padding:20px;display:flex;gap:10px">
      <button onclick="shareKakao()" class="share-btn" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;flex:1;background:#FEE500;color:#3A1D1D;font-family:'Noto Sans KR',sans-serif">рҹ’¬ м№ҙм№ҙмҳӨнҶЎ кіөмң </button>
      <button onclick="copyLink()" class="share-btn" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 0;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;flex:1;background:#2C2C2C;color:white;font-family:'Noto Sans KR',sans-serif">рҹ”— л§ҒнҒ¬ ліөмӮ¬</button>
    </div>
  `;
  wrap.style.display='block';
  document.getElementById('loadingScreen').classList.add('hide');
  setTimeout(()=>{const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');io.unobserve(x.target);}}),{threshold:.06});document.querySelectorAll('.reveal').forEach(el=>io.observe(el));},100);
}
</script>
</body>
</html>
